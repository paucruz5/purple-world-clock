<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Purple world clock shows you the current time in 8 default cities and in your location's city."
    />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.5.45/moment-timezone-with-data-1970-2030.min.js"></script>
    <title>Purple World Clock</title>
  </head>
  <body>
    <div class="container">
      <h1>World Clock</h1>

      <select name="" id="city">
        <option value="">Select a city</option>
        <option value="current">My location</option>
        <option value="Australia/Tasmania">Tasmania</option>
        <option value="Africa/Maputo">Maputo</option>
        <option value="Europe/Madrid">Madrid</option>
        <option value="Asia/Hong_Kong">Hong Kong</option>
      </select>

      <div id="cities">
        <div class="city" id="cuiaba">
          <div>
            <h2>Cuiaba</h2>
            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>
        <div class="city" id="merida">
          <div>
            <h2>Merida</h2>
            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>
        <div class="city" id="lagos">
          <div>
            <h2>Lagos</h2>
            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>
        <div class="city" id="athens">
          <div>
            <h2>Athens</h2>
            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>
      </div>
    </div>
    <footer>
      Coded by
      <a href="https://paucruz.com/" target="_blank" rel="noopener noreferrer">
        Paulina Cruz</a
      >; open-sourced on
      <a
        href="https://github.com/paucruz5/purple-world-clock"
        target="_blank"
        rel="noopener noreferrer"
      >
        Github</a
      >; hosted on Netlify
    </footer>
    <script src="javascript/index.js"></script>
  </body>
</html>
